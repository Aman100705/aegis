name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install fastapi "uvicorn[standard]" pydantic pydantic-settings SQLAlchemy scikit-learn numpy prometheus-client pytest httpx ruff mypy
      - run: ruff check .
      - run: mypy aegis
      - run: pytest -q

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t aegis:ci .
