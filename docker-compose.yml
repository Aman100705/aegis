services:
  aegis:
    build: .
    ports:
      - "8000:8000"
    environment:
      AEGIS_API_KEYS: "demo-key"
      AEGIS_PII_SECRET: "change-me-in-prod"
      # AEGIS_DATABASE_URL: postgresql+psycopg://aegis:aegis@postgres:5432/aegis
    restart: unless-stopped

  # Provisioned for the production data layer (set AEGIS_DATABASE_URL to use it).
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: aegis
      POSTGRES_USER: aegis
      POSTGRES_PASSWORD: aegis
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pgdata:
